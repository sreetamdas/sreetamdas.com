name: Preview Deploy

on:
  pull_request:

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Velite output
        uses: actions/cache@v5
        with:
          path: .velite
          key: velite-${{ hashFiles('content/**/*', '.config/velite.config.ts') }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy preview
        id: deploy
        run: |
          OUTPUT=$(pnpm deploy:preview 2>&1)
          echo "$OUTPUT"
          # Extract preview URL from wrangler output
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.workers\.dev' | head -1)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKERS_CI_BRANCH: ${{ github.head_ref }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botPrefix = "<!-- preview-deploy-bot -->";
            const existing = comments.find(c => c.body?.startsWith(botPrefix));

            const outcome = '${{ job.status }}' === 'success' ? "✅" : "❌";
            const sha = context.sha.substring(0, 7);
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const urlLine = previewUrl ? `🔗 [Preview URL](${previewUrl})` : '❌ No preview URL found in deploy output';
            const body = `${botPrefix}\n${outcome} Preview deploy for \`${sha}\`\n\n${urlLine}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
